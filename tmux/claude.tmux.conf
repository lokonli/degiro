# tmux configuration tuned for running Claude Code inside tmux.
#
# Standalone, doesn't touch ~/.tmux.conf. Load it via:
#   scripts/claude-tmux.sh              (recommended — see docs/tmux-usage.md)
# or manually:
#   tmux source-file tmux/claude.tmux.conf

# --- Terminal / rendering ---
# Claude Code's TUI needs a real 256/true-color terminal and an instant Esc
# (Esc is how you interrupt/cancel a running turn — tmux's default ~500ms
# escape-time makes that feel laggy and can mangle Alt-key sequences).
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -s escape-time 0
set -g focus-events on
set -g allow-passthrough on

# Pass through modified keys (e.g. Shift+Enter for a newline in the prompt)
# instead of tmux swallowing them. Needs a terminal that sends them in the
# first place — see docs/tmux-usage.md for terminal-specific caveats.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# --- Usability ---
set -g mouse on
set -g history-limit 100000
set -g set-clipboard on
set -g status-interval 5

# --- Panes/windows ---
set -g pane-border-status top
set -g pane-border-format " #{pane_index} #{pane_title} "
setw -g automatic-rename off

# --- Status bar ---
set -g status-style bg=colour235,fg=colour250
set -g status-left "#[bold]#S "
set -g status-right "%H:%M "
setw -g window-status-current-style bg=colour238,bold

# --- Keybindings ---
# prefix + C: open a new window running claude (uppercase, doesn't collide
# with the default prefix+c "new window" binding)
bind-key C new-window -n claude "claude"
